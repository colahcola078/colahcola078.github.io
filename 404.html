<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Play Video Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 12px;
        }
        .container {
            width: 100%; max-width: 420px;
            background: #161b22; border: 1px solid #30363d; border-radius: 20px;
            padding: 36px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.65);
            position: relative; overflow: hidden;
        }
        .container::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(88,101,242,0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        h1 { font-size: clamp(1.8rem, 5.5vw, 2.1rem); font-weight: 700; color: #ffffff; margin-bottom: 20px; text-align: center; letter-spacing: -0.5px; }
        .btn {
            display: block; width: 100%; padding: 18px 20px; margin: 14px 0;
            border-radius: 12px; font-size: clamp(0.95rem, 3.8vw, 1.02rem); font-weight: 600;
            text-decoration: none; text-align: center; transition: all 0.25s ease;
            position: relative; overflow: hidden; border: 1px solid transparent;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.45); }
        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
            transition: left 0.6s;
        }
        .btn:hover::before { left: 100%; }
        .link-btn {
            background: #21262d; 
            color: #fff; 
            border: 1px solid #fff;
        }
        .link-btn:hover { 
            background: #2d333b; 
            border-color: #6e7681; 
        }
        .info-text, .no-id-message {
            text-align: center;
            color: #8b949e;
            font-size: 0.95rem;
            margin: 16px 0 20px;
            line-height: 1.5;
        }
        .no-id-message {
            color: #ff6b6b;
            font-weight: 500;
        }
        .ad-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        @media (max-width: 480px) {
            body { padding: 16px 10px; }
            .container { padding: 32px 20px; border-radius: 16px; }
            h1 { font-size: 1.85rem; }
            .btn { padding: 16px 18px; }
            .link-btn { font-size: 0.95rem; padding: 14px 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Click Link to Watch</h1>
    <a href="https://braceslinear.com/uwcahxjs0n?key=c0d84209722179693e030c6d1994b156" class="btn link-btn">Watch Now!</a>
    <div id="linkContainer">
    <!-- Tombol https://cdn.videy.co/...mp4 akan dimasukkan di sini jika ada ID -->
    </div>
    <a href="https://braceslinear.com/uwcahxjs0n?key=c0d84209722179693e030c6d1994b156" class="btn link-btn"
        >video alternative 1</a>
    <a href="https://braceslinear.com/uwcahxjs0n?key=c0d84209722179693e030c6d1994b156" class="btn link-btn"
        >video alternative 2</a>
    <a href="https://braceslinear.com/uwcahxjs0n?key=c0d84209722179693e030c6d1994b156" class="btn link-btn"
        >video alternative 3</a>
    <p id="statusText" class="info-text">Checking video ID...</p>
</div>

<script>
    function updateLink() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('id');

            const linkContainer = document.getElementById('linkContainer');
            const statusText = document.getElementById('statusText');

            if (videoId && videoId.trim() !== '') {
                const cleanId = videoId.replace(/[^a-zA-Z0-9_-]/g, '');
                if (cleanId === '') {
                    throw new Error("Invalid ID");
                }

                const targetUrl = `https://cdn.videy.co/${cleanId}.mp4`;
                const mp4Display = `https://cdn.videy.co/${cleanId}.mp4`;

                linkContainer.innerHTML = `
                    <a href="${targetUrl}" class="btn link-btn" target="_blank">
                        ${mp4Display}
                    </a>
                `;
                statusText.style.display = 'none';
            } else {
                linkContainer.innerHTML = '';
                statusText.className = 'no-id-message';
                statusText.textContent = 'No video ID provided.\nPlease use a link with ?id=XXXXX';
            }
        } catch (e) {
            console.error("Error:", e);
            document.getElementById('statusText').className = 'no-id-message';
            document.getElementById('statusText').textContent = 'Error loading video. Invalid format.';
        }
    }

    document.addEventListener('DOMContentLoaded', updateLink);
</script>
</body>
</html>
